<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Math Stake{% endblock %}</title>
    <style>
        :root {
            --paper: #f7f1e3;
            --paper-strong: #fffaf0;
            --ink: #1d2a38;
            --ink-soft: #5d6c7b;
            --line: rgba(29, 42, 56, 0.12);
            --accent: #c86b3c;
            --accent-deep: #945030;
            --panel: rgba(255, 250, 240, 0.86);
            --shadow: 0 20px 40px rgba(36, 40, 46, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: var(--ink);
            font-family: "Noto Serif SC", "Source Han Serif SC", "LXGW WenKai", serif;
            background:
                radial-gradient(circle at top left, rgba(200, 107, 60, 0.12), transparent 30%),
                radial-gradient(circle at bottom right, rgba(93, 108, 123, 0.1), transparent 28%),
                linear-gradient(180deg, #fdf8ef 0%, #f3ebda 100%);
            min-height: 100vh;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            width: min(980px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0 48px;
        }

        .hero {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 28px;
            box-shadow: var(--shadow);
            padding: 28px;
            backdrop-filter: blur(10px);
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent-deep);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: 0.78rem;
        }

        h1, h2, h3, p {
            margin-top: 0;
        }

        .muted {
            color: var(--ink-soft);
        }

        .grid {
            display: grid;
            gap: 18px;
        }

        .grid.cards {
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            margin-top: 24px;
        }

        .card {
            background: rgba(255, 255, 255, 0.58);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 22px;
            box-shadow: 0 12px 30px rgba(36, 40, 46, 0.06);
        }

        .pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 16px 0 0;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 8px 12px;
            background: rgba(29, 42, 56, 0.06);
            color: var(--ink-soft);
            font-size: 0.92rem;
        }

        .button,
        button {
            border: 0;
            border-radius: 999px;
            padding: 12px 18px;
            background: linear-gradient(135deg, var(--accent) 0%, #d98e56 100%);
            color: #fff8ef;
            font: inherit;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            box-shadow: 0 12px 24px rgba(200, 107, 60, 0.24);
        }

        .button:hover,
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 30px rgba(200, 107, 60, 0.28);
        }

        .button.secondary {
            background: rgba(29, 42, 56, 0.08);
            color: var(--ink);
            box-shadow: none;
        }

        .messages {
            display: grid;
            gap: 10px;
            margin: 0 0 18px;
        }

        .message {
            border-radius: 18px;
            padding: 14px 16px;
            background: rgba(255, 239, 213, 0.9);
            border: 1px solid rgba(200, 107, 60, 0.18);
        }

        .stats {
            display: grid;
            gap: 14px;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        }

        .stat {
            padding: 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.62);
            border: 1px solid var(--line);
        }

        .stat strong {
            display: block;
            font-size: 1.7rem;
            margin-top: 6px;
        }

        .question-list {
            display: grid;
            gap: 16px;
            margin-top: 24px;
        }

        .question {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 132px;
            gap: 14px;
            align-items: center;
            padding: 18px 20px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.62);
            border: 1px solid var(--line);
        }

        .question strong {
            font-size: clamp(1.3rem, 2vw, 1.7rem);
            font-weight: 600;
        }

        input[type="number"] {
            width: 100%;
            border: 1px solid rgba(29, 42, 56, 0.12);
            border-radius: 16px;
            padding: 14px 16px;
            font: inherit;
            font-size: 1.1rem;
            background: rgba(255, 250, 240, 0.92);
        }

        .sticky-bar {
            position: sticky;
            top: 12px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin: 22px 0;
            padding: 16px 20px;
            border-radius: 22px;
            background: rgba(29, 42, 56, 0.92);
            color: #fffaf0;
            box-shadow: var(--shadow);
        }

        .sticky-bar strong {
            font-size: 1.2rem;
        }

        .wrong-list {
            display: grid;
            gap: 12px;
        }

        .wrong-item {
            padding: 16px 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid var(--line);
        }

        @media (max-width: 720px) {
            .page {
                width: min(100%, calc(100% - 20px));
                padding-top: 20px;
            }

            .hero,
            .card,
            .question {
                border-radius: 20px;
            }

            .question {
                grid-template-columns: 1fr;
            }

            .sticky-bar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        {% if messages %}
            <section class="messages">
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            </section>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
